server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow up to 11 MB request bodies (covers 10 MB image uploads)
    client_max_body_size  11m;
    # Allow slow mobile connections up to 3 minutes to finish sending the body
    client_body_timeout   180s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "camera=(), microphone=(self), geolocation=()" always;
    # CSP: allow scripts from cdnjs (SignalR + QRCode), fonts from Google.
    # 'unsafe-inline' is required because the HTML uses onclick attributes throughout.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'self' wss: ws:; worker-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to backend container
    location /api/ {
        proxy_pass              http://backend/api/;
        proxy_http_version      1.1;
        proxy_set_header        Host             $host;
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
        # Stream request body straight to backend so slow uploads aren't buffered in RAM
        proxy_request_buffering off;
        # Give enough time for large uploads on slow mobile connections
        proxy_read_timeout      180s;
        proxy_send_timeout      180s;
    }

    # Proxy SignalR WebSocket hub to backend container
    location /chathub {
        proxy_pass             http://backend/chathub;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "Upgrade";
        proxy_set_header       Host       $host;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # Health endpoint
    location /health {
        proxy_pass http://backend/health;
    }

    # Service worker must never be cached so browsers pick up updates immediately
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }
}
